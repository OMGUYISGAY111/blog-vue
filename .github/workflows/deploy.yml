name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 在装 Node 之前先安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # 或者你本地使用的版本

      # 2. 安装 Node 并配置 pnpm 缓存
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm' # 既然有 lock 文件，现在可以开心地启用缓存了

      # 3. 使用 pnpm 安装依赖并构建
      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile # 确保完全按照你的 pnpm-lock.yaml 安装
          pnpm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist